services:
  - type: web
    name: currencyx
    runtime: python
    env: python
    region: frankfurt  # or oregon, etc.
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "gunicorn your_project_name.wsgi:application"
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"  # allows all your render subdomains
      - key: WEB_CONCURRENCY
        value: "4"