<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Currency Converter</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0d5c33",
                        "primary-dark": "#062919",
                        "beige-light": "#fdfaf5",
                        "beige-medium": "#f5f0e1",
                        "beige-dark": "#e8e1cf",
                        "text-main": "#0a2a1a",
                        "background-light": "#fdfaf5",
                        "background-dark": "#062919",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                },
            },
        }
    </script>
    <style type="text/tailwindcss">
        body {
            font-family: 'Inter', sans-serif;
        }
        .nav-open {
            display: flex !important;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0d5c33, #0a3d25, #062919);
            color: white;
            min-height: 100vh;
            padding: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 650px;
            width: 100%;
            background: rgba(255, 255, 255, 0.94);
            color: #0a3d25;
            border-radius: 24px;
            padding: 1.8rem;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
        }

        h1 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: #0a3d25;
            font-size: 2rem;
            font-weight: 700;
        }

        .status {
            text-align: center;
            margin-bottom: 1.2rem;
            font-size: 0.9rem;
            color: #0d5c33;
            font-weight: 600;
        }

        .converter {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            background: white;
            padding: 0.8rem;
            border-radius: 14px;
            border: 2px solid #c8e6c9;
        }

        .input-group input {
            flex: 1;
            font-size: 1.2rem;
            border: none;
            outline: none;
            background: transparent;
            color: #0a3d25;
            font-weight: 700;
            min-width: 0;
        }

        .input-group select {
            min-width: 100px;
            padding: 0.5rem 0.8rem;
            font-size: 1.1rem;
            border: none;
            outline: none;
            background: white;
            /* ✅ Critical: don't use transparent on mobile */
            color: #0a3d25;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;

            /* Preserve native dropdown arrow on all devices */
            -webkit-appearance: menulist;
            -moz-appearance: menulist;
            appearance: menulist;
        }

        .swap-btn {
            background: #0d5c33;
            color: white;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-weight: bold;
            cursor: pointer;
            margin: 0 auto;
            display: block;
            font-size: 1.3rem;
            transition: transform 0.3s;
        }

        .swap-btn:hover {
            background: #0a4a2a;
            transform: rotate(180deg);
        }

        .rate-info {
            text-align: center;
            margin-top: 1rem;
            font-size: 1rem;
            color: #0d5c33;
            font-weight: 600;
            min-height: 1.4rem;
        }

        .footer-note {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #0a3d25;
            opacity: 0.8;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 1.5rem;
            padding: 0.5rem 1rem;
            background: #0d5c33;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: background 0.3s, transform 0.2s;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }

        .back-btn:hover {
            background: #0a4a2a;
            transform: translateX(-3px);
        }

        @media (max-width: 600px) {
            .container {
                padding: 1.4rem;
            }

            h1 {
                font-size: 1.8rem;
            }

            .input-group input {
                font-size: 1.1rem;
            }

            .input-group select {
                font-size: 1rem;
                min-width: 90px;
                padding: 0.4rem 0.6rem;
            }
        }
    </style>
</head>

<body>
    <header class="fixed top-0 left-0 right-0 z-50 w-full bg-green-50 dark:bg-green-900/20 backdrop-blur-md border-b border-green-200 dark:border-green-800 shadow-lg">
        <div class="max-w-[1280px] mx-auto px-6 lg:px-40 py-4 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="text-primary">
                    <span style="font-size: 1.875rem;">💱</span>
                </div>
                <h2 class="text-text-main dark:text-white text-xl font-extrabold leading-tight tracking-tight">
                    <a href="/">CurrencyX</a>
                </h2>
            </div>
            <button id="hamburger-btn" class="md:hidden flex items-center justify-center w-10 h-10 rounded-lg hover:bg-green-100 dark:hover:bg-green-800 transition-colors">
                <svg class="w-6 h-6 text-text-main dark:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
            <nav id="nav-menu" class="hidden md:flex md:items-center md:gap-8 absolute md:static top-full left-0 right-0 md:bg-transparent bg-green-600 dark:bg-green-700 border-b md:border-b-0 border-green-700 dark:border-green-800 flex-col md:flex-row p-4 md:p-0 gap-4 md:gap-8 shadow-lg md:shadow-none">
                <a href="/" class="text-white md:text-text-main md:dark:text-white hover:text-green-100 md:hover:text-primary transition-colors">Home</a>
                <a href="/dashboard/" class="text-white md:text-text-main md:dark:text-white hover:text-green-100 md:hover:text-primary transition-colors">Dashboard</a>
            </nav>
        </div>
    </header>

    <div class="container pt-24 md:pt-28">
        <a href="/" class="back-btn">← Back to Home</a>
        <h1>💱 Live Currency Converter</h1>
        <div class="status">Fetching real-time rates...</div>
        <div class="converter">
            <div class="input-group">
                <input type="text" id="amountFrom" placeholder="0.00" value="0">
                <select id="fromCurrency"></select>
            </div>

            <button class="swap-btn" onclick="swapCurrencies()">⇅</button>

            <div class="input-group">
                <input type="text" id="amountTo" placeholder="0.00">
                <select id="toCurrency"></select>
            </div>

            <div class="rate-info" id="rateInfo"></div>
        </div>
    </div>

    <script>
        const amountFrom = document.getElementById('amountFrom');
        const amountTo = document.getElementById('amountTo');
        const fromCurrency = document.getElementById('fromCurrency');
        const toCurrency = document.getElementById('toCurrency');
        const status = document.querySelector('.status');
        const rateInfo = document.getElementById('rateInfo');

        let rates = null;
        let lastFetch = 0;
        const CACHE_TIME = 60000;

        async function fetchRates() {
            const now = Date.now();
            if (rates && (now - lastFetch) < CACHE_TIME) {
                populateDropdowns();
                return;
            }

            try {
                status.textContent = "Loading latest rates...";
                // 🔥 Fixed: removed trailing spaces in URL
                const res = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
                if (!res.ok) throw new Error("API fetch failed");
                const data = await res.json();
                rates = data.rates;
                lastFetch = now;
                populateDropdowns();
                status.textContent = "✅ Live rates loaded!";
                setTimeout(() => {
                    if (status.textContent === "✅ Live rates loaded!")
                        status.textContent = "";
                }, 2500);
            } catch (err) {
                console.error(err);
                status.innerHTML = '<span style="color:#d32f2f;">❌ Failed to load rates</span>';
            }
        }

        function populateDropdowns() {
            const currencies = Object.keys(rates).sort();
            fromCurrency.innerHTML = '';
            toCurrency.innerHTML = '';

            currencies.forEach(code => {
                fromCurrency.add(new Option(code, code));
                toCurrency.add(new Option(code, code));
            });

            fromCurrency.value = 'USD';
            toCurrency.value = 'RWF';
            convert('from');
        }

        function convert(changedField) {
            if (!rates) return;

            const from = fromCurrency.value;
            const to = toCurrency.value;

            if (!(from in rates) || !(to in rates)) {
                amountTo.value = '';
                amountFrom.value = '';
                rateInfo.textContent = '⚠️ Unsupported currency';
                return;
            }

            const rate = rates[to] / rates[from];
            rateInfo.textContent = `1 ${from} = ${rate.toFixed(4)} ${to}`;

            if (changedField === 'from') {
                const val = parseFloat(amountFrom.value);
                if (isNaN(val) || val <= 0) {
                    amountTo.value = '';
                    return;
                }
                amountTo.value = (val * rate).toFixed(2);
            } else if (changedField === 'to') {
                const val = parseFloat(amountTo.value);
                if (isNaN(val) || val <= 0) {
                    amountFrom.value = '';
                    return;
                }
                amountFrom.value = (val / rate).toFixed(2);
            }
        }

        function swapCurrencies() {
            [fromCurrency.value, toCurrency.value] = [toCurrency.value, fromCurrency.value];
            [amountFrom.value, amountTo.value] = [amountTo.value, amountFrom.value];
            if (amountFrom.value) convert('from');
            else if (amountTo.value) convert('to');
        }

        amountFrom.addEventListener('input', () => convert('from'));
        amountTo.addEventListener('input', () => convert('to'));
        fromCurrency.addEventListener('change', () => convert('from'));
        toCurrency.addEventListener('change', () => convert('to'));

        fetchRates();
    </script>

    <script>
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const navMenu = document.getElementById('nav-menu');

        hamburgerBtn.addEventListener('click', () => {
            navMenu.classList.toggle('nav-open');
        });

        // Close menu when a link is clicked
        const navLinks = navMenu.querySelectorAll('a');
        navLinks.forEach(link => {
            link.addEventListener('click', () => {
                navMenu.classList.remove('nav-open');
            });
        });
    </script>
</body>

</html>
